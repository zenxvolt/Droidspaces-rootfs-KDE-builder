name: 编译并发布 Droidspaces RootFS

on:
  workflow_dispatch: 
    inputs:
      build_target:
        description: '选择要构建的发行版'
        required: true
        type: choice
        default: 'Debian-13-KDE'
        options:
          - 'Debian-13-KDE'
          - 'Ubuntu-24-KDE'
          - 'Ubuntu-25-KDE'
          - 'Ubuntu-26-KDE'
          - 'Fedora-43-KDE'
          - 'Fedora-44-KDE'
          - 'Arch-KDE'
          - 'Kali-Rolling-KDE'
          - 'all'
          - 'all-wayland'
      custom_username:
        description: '自定义用户名（默认 Gold）'
        required: false
        type: string
        default: 'Gold'
      build_KDE:
        description: 'KDE桌面选择(conc-精简 min-最小构造 mobile-移动版 none-不用KDE)'
        required: true
        type: choice
        default: 'min'
        options: 
          - 'conc'
          - 'min'
          - 'mobile'
          - 'none'
      build_KDE_plus:
        description: 'KDE 桌面开机自启动 (需要 KDE 桌面选择为 conc、min 或 mobile)'
        required: true
        type: boolean
        default: true
      enable_anland_kde:
        description: 'Wayland 支持（支持 Debian-13、Ubuntu-26、Fedora-43/44、Kali-Rolling,选择 mobile 强制 wayland）'
        required: true
        type: boolean
        default: false
      PulseAudio:
        description: 'PulseAudio 音频转发'
        required: true
        type: choice
        default: 'socket'
        options: 
          - 'socket'
          - 'tcp'
          - 'none'
      enable_zh_tz:
        description: '使用 中文 语言，并更改时区'
        required: true
        type: boolean
        default: true
      enable_mesa:
        description: '开启 高通骁龙GPU 支持'
        required: true
        type: boolean
        default: true
      enable_8gen2_wayland:
        description: '修复 8Gen2 Wayland 花屏'
        required: true
        type: boolean
        default: false
      enable_tmoe:
        description: '集成 TMOE '
        required: true
        type: boolean
        default: true
      nosnap:
        description: 'nosnap: 干掉 Ubuntu 的 Snap'
        required: true
        type: boolean
        default: false
      enable_srf:
        description: '开启 输入法 fcitx5 支持'
        required: true
        type: boolean
        default: false
      enable_binfmt:
        description: '开启 跨架构 支持'
        required: true
        type: boolean
        default: false
      enable_yj:
        description: '开启 Nat和硬件识别 支持'
        required: true
        type: boolean
        default: true
      enable_kfgj:
        description: '开发工具 集成'
        required: true
        type: boolean
        default: false
      enable_zip:
        description: '压缩工具 集成'
        required: true
        type: boolean
        default: true
      enable_docker:
        description: 'Docker 集成'
        required: true
        type: boolean
        default: false    
      build_wayland_packages:
        description: '触发 KDE Wayland 预编译包构建流程'
        required: true
        type: boolean
        default: false

jobs:
  # --------------------------------------------------------
  # 阶段 1: setup (环境准备与变量生成)
  # --------------------------------------------------------
  setup:
    runs-on: ubuntu-latest
    outputs:
      templates: ${{ steps.find-templates.outputs.templates }}
      wayland_enabled: ${{ steps.find-templates.outputs.wayland_enabled }}
      wayland_package_target: ${{ steps.find-templates.outputs.wayland_package_target }}
      pulseaudio_effective: ${{ steps.find-templates.outputs.pulseaudio_effective }}
      build_id: ${{ steps.prep.outputs.build_id }}
      build_date: ${{ steps.prep.outputs.build_date }}
    steps:
      - name: 检出代码库
        uses: actions/checkout@v5

      - name: 解析用户的构建选择
        id: find-templates
        run: |
          TARGET="${{ github.event.inputs.build_target }}"
          BUILD_KDE="${{ github.event.inputs.build_KDE }}"
          ENABLE_ANLAND_KDE="${{ github.event.inputs.enable_anland_kde }}"
          BUILD_WAYLAND_PACKAGES="${{ github.event.inputs.build_wayland_packages }}"
          PULSE_AUDIO="${{ github.event.inputs.PulseAudio }}"
          WAYLAND_PACKAGE_TARGET=""
          
          case "$TARGET" in
            all)
              TEMPLATES=$(ls *.Dockerfile | sed 's/\.Dockerfile//' | jq -R -s -c 'split("\n")[:-1]')
              WAYLAND_PACKAGE_TARGET="all"
              ;;
            all-wayland)
              TEMPLATES=$(jq -n -c '["Debian-13-KDE","Ubuntu-26-KDE","Fedora-43-KDE","Fedora-44-KDE","Kali-Rolling-KDE"]')
              ENABLE_ANLAND_KDE="true"
              WAYLAND_PACKAGE_TARGET="all"
              ;;
            Debian-13-KDE)
              TEMPLATES=$(jq -n -c --arg t "$TARGET" '[$t]')
              WAYLAND_PACKAGE_TARGET="Debian13"
              ;;
            Ubuntu-26-KDE)
              TEMPLATES=$(jq -n -c --arg t "$TARGET" '[$t]')
              WAYLAND_PACKAGE_TARGET="ubuntu2604"
              ;;
            Fedora-43-KDE)
              TEMPLATES=$(jq -n -c --arg t "$TARGET" '[$t]')
              WAYLAND_PACKAGE_TARGET="Fedora43"
              ;;
            Fedora-44-KDE)
              TEMPLATES=$(jq -n -c --arg t "$TARGET" '[$t]')
              WAYLAND_PACKAGE_TARGET="Fedora44"
              ;;
            Kali-Rolling-KDE)
              TEMPLATES=$(jq -n -c --arg t "$TARGET" '[$t]')
              WAYLAND_PACKAGE_TARGET="kali"
              ;;
            *)
              TEMPLATES=$(jq -n -c --arg t "$TARGET" '[$t]')
              ;;
          esac

          if [ "$BUILD_KDE" = "mobile" ] && [ "$TARGET" != "Ubuntu-26-KDE" ] && [ "$TARGET" != "Debian-13-KDE" ] && [ "$TARGET" != "Fedora-43-KDE" ] && [ "$TARGET" != "Fedora-44-KDE" ] && [ "$TARGET" != "Kali-Rolling-KDE" ] && [ "$TARGET" != "all-wayland" ]; then
            echo "错误: 移动版 KDE 目前支持 Ubuntu-26-KDE、Debian-13-KDE、Fedora-43-KDE、Fedora-44-KDE、Kali-Rolling-KDE、all-wayland" >&2
            exit 1
          fi

          if [ "$ENABLE_ANLAND_KDE" = "true" ] && [ "$BUILD_KDE" = "none" ]; then
            echo "错误: 启用 Wayland 支持时，KDE 桌面选择不能为 'none'" >&2
            exit 1
          fi

          if [ "$BUILD_KDE" = "mobile" ]; then
            echo "提示: 选择了移动版 KDE，Wayland 支持已强制启用"
            ENABLE_ANLAND_KDE="true"
          fi

          if [ "$ENABLE_ANLAND_KDE" = "true" ]; then
            echo "提示: 选择了启用 Wayland 支持，PulseAudio 将被禁用，Anland app 自带音频"
            PULSE_AUDIO="none"
          fi

          if [ "$BUILD_WAYLAND_PACKAGES" = "true" ] && [ -z "$WAYLAND_PACKAGE_TARGET" ]; then
            echo "错误: KDE Wayland 预编译包仅支持 Debian-13-KDE、Ubuntu-26-KDE、Fedora-43-KDE、Fedora-44-KDE、Kali-Rolling-KDE、all 或 all-wayland" >&2
            exit 1
          fi
          
          echo "templates=$TEMPLATES" >> $GITHUB_OUTPUT
          echo "wayland_enabled=$ENABLE_ANLAND_KDE" >> $GITHUB_OUTPUT
          echo "wayland_package_target=$WAYLAND_PACKAGE_TARGET" >> $GITHUB_OUTPUT
          echo "pulseaudio_effective=$PULSE_AUDIO" >> $GITHUB_OUTPUT
          echo "最终决定的构建矩阵: $TEMPLATES"
          echo "Wayland 支持最终值: $ENABLE_ANLAND_KDE"
          echo "KDE Wayland 预编译包目标: ${WAYLAND_PACKAGE_TARGET:-none}"
          echo "PulseAudio 最终值: $PULSE_AUDIO"

      - name: 准备构建元数据
        id: prep
        run: |
          BUILD_DATE=$(date +'%Y-%m-%d %H:%M:%S')
          BUILD_ID="v$(date +'%Y%m%d-%H%M%S')"
          echo "BUILD_DATE=$BUILD_DATE" >> $GITHUB_OUTPUT
          echo "BUILD_ID=$BUILD_ID" >> $GITHUB_OUTPUT
          echo "构建 ID: $BUILD_ID"

  # --------------------------------------------------------
  # 可选: 触发 KDE Wayland 预编译包构建
  # --------------------------------------------------------
  build-wayland-packages:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      actions: write
      checks: read
      contents: read
    steps:
      - name: 跳过 KDE Wayland 预编译包工作流
        if: ${{ github.event.inputs.build_wayland_packages != 'true' }}
        run: echo "未启用 KDE Wayland 预编译包工作流触发。"

      - name: 触发并等待 KDE Wayland 预编译包工作流
        if: ${{ github.event.inputs.build_wayland_packages == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          WAYLAND_PACKAGE_TARGET: ${{ needs.setup.outputs.wayland_package_target }}
          REQUEST_ID: rootfs-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          set -euo pipefail

          gh api \
            --method POST \
            "repos/${{ github.repository }}/actions/workflows/build-kde-wayland.yml/dispatches" \
            -f "ref=${{ github.ref_name }}" \
            -f "inputs[build_target]=$WAYLAND_PACKAGE_TARGET" \
            -f "inputs[anland_ref]=main" \
            -f "inputs[anland_repo]=https://github.com/superturtlee/anland.git" \
            -f "inputs[commit_changes]=true" \
            -f "inputs[request_id]=$REQUEST_ID"

          echo "已触发 build-kde-wayland.yml，build_target=$WAYLAND_PACKAGE_TARGET request_id=$REQUEST_ID"

          run_id=""
          for attempt in {1..60}; do
            run_id="$(gh api \
              --method GET \
              "repos/${{ github.repository }}/actions/workflows/build-kde-wayland.yml/runs" \
              -f event=workflow_dispatch \
              -f branch="${{ github.ref_name }}" \
              -f per_page=20 \
              --jq "first(.workflow_runs[] | select(.display_title | contains(\"$REQUEST_ID\")) | .id) // \"\"")"

            if [ -n "$run_id" ]; then
              break
            fi

            echo "等待 build-kde-wayland.yml run 出现 ($attempt/60)..."
            sleep 10
          done

          if [ -z "$run_id" ]; then
            echo "错误: 等待 build-kde-wayland.yml run 出现超时" >&2
            exit 1
          fi

          echo "等待 build-kde-wayland.yml run $run_id 完成..."
          gh run watch "$run_id" --repo "${{ github.repository }}" --exit-status --interval 60

  # --------------------------------------------------------
  # 阶段 2: build (常规 Linux 发行版 RootFS 的构建)
  # --------------------------------------------------------
  build:
    needs: [setup, build-wayland-packages]
    if: ${{ needs.setup.outputs.templates != '[]' }}
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        template: ${{ fromJson(needs.setup.outputs.templates) }}
    steps:
      - name: 检出代码库
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref_name }}

      - name: 验证构建选项
        run: |
          if [ "${{ inputs.build_KDE }}" = "none" ] && [ "${{ inputs.build_KDE_plus }}" = "true" ]; then
            echo "❌ 错误: 当 KDE 桌面选择为 'none' 时，无法启用 KDE 开机自启动"
            echo "请重新运行工作流，取消勾选 'KDE 桌面开机自启动' 或选择 KDE 桌面"
            exit 1
          fi

      - name: 编译 RootFS (${{ matrix.template }})
        run: |
          chmod +x build_rootfs-native.sh
          ./build_rootfs-native.sh \
            -i "${{ matrix.template }}.Dockerfile" \
            -v "${{ needs.setup.outputs.build_id }}" \
            -K "${{ inputs.build_KDE }}" \
            -L "${{ inputs.build_KDE_plus }}" \
            -P "${{ needs.setup.outputs.pulseaudio_effective }}" \
            -g "${{ inputs.enable_zh_tz }}" \
            -a "${{ inputs.enable_binfmt }}" \
            -b "${{ inputs.enable_yj }}" \
            -c "${{ inputs.enable_mesa }}" \
            -d "${{ inputs.enable_kfgj }}" \
            -e "${{ inputs.enable_zip }}" \
            -f "${{ inputs.enable_docker }}" \
            -h "${{ inputs.enable_srf }}" \
            -j "${{ inputs.enable_tmoe }}" \
            -n "${{ inputs.nosnap }}" \
            -t "${{ inputs.enable_8gen2_wayland }}" \
            -A "${{ needs.setup.outputs.wayland_enabled }}" \
            -u "${{ inputs.custom_username }}"

      - name: 上传构建产物
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.template }}-rootfs
          path: "*.tar.xz"
          retention-days: 1

  # --------------------------------------------------------
  # 阶段 3: release (汇总发布)
  # --------------------------------------------------------
  release:
    needs: [setup, build]
    if: ${{ !cancelled() && needs.setup.result == 'success' && needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 检出代码库
        uses: actions/checkout@v5
        
      - name: 下载所有产物
        uses: actions/download-artifact@v7
        with:
          pattern: "*-rootfs"
          merge-multiple: true
          
      - name: 整理资源
        run: |
          mkdir -p release_assets
          mv *.tar.xz release_assets/
          PA_CHOICE="${{ needs.setup.outputs.pulseaudio_effective }}"
          CUSTOM_USERNAME="${{ github.event.inputs.custom_username }}"
          build_KDE_plus="${{ github.event.inputs.build_KDE_plus }}"
          if [ "$PA_CHOICE" != "none" ] && [ "$build_KDE_plus" = "false" ]; then
            cp "scripts/on_aaudio_${PA_CHOICE}.sh" "release_assets/on_aaudio_${PA_CHOICE}.sh"
            sed -i "s/USERNAME=\"Gold\"/USERNAME=\"${CUSTOM_USERNAME}\"/g" "release_assets/on_aaudio_${PA_CHOICE}.sh"
          fi
          
      - name: 创建统一 Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.setup.outputs.build_id }}
          name: "Droidspaces RootFS ${{ needs.setup.outputs.build_id }}"
          files: "release_assets/*"
          body: |
            Droidspaces RootFS 自动构建
            构建时间 : ${{ needs.setup.outputs.build_date }}
            构建目标（用户指定）: ${{ github.event.inputs.build_target }}
            构建 ID: ${{ needs.setup.outputs.build_id }}

            构建选项:
            - **自定义用户名**: ${{ github.event.inputs.custom_username }}
            - **KDE 桌面**: ${{ github.event.inputs.build_KDE }}
            - **KDE 开机自启动**: ${{ github.event.inputs.build_KDE_plus }}
            - **Wayland 支持**: ${{ needs.setup.outputs.wayland_enabled }}
            - KDE Wayland 预编译包目标: ${{ needs.setup.outputs.wayland_package_target || 'none' }}
            - PulseAudio 音频转发: ${{ needs.setup.outputs.pulseaudio_effective }}
            - anland 音频说明: Wayland 模式下使用 anland app 自带音频，无需 PulseAudio
            - nosnap: ${{ github.event.inputs.nosnap }}
            - 使用中文作为主语言: ${{ github.event.inputs.enable_zh_tz }}
            - 高通骁龙 GPU 支持: ${{ github.event.inputs.enable_mesa }}
            - 修复 8Gen2 Wayland 花屏: ${{ github.event.inputs.enable_8gen2_wayland }}
            - 集成 TMOE : ${{ github.event.inputs.enable_tmoe }}
            - 输入法 fcitx5 支持: ${{ github.event.inputs.enable_srf }}
            - 跨架构支持: ${{ github.event.inputs.enable_binfmt }}
            - 容器硬件与网络识别支持: ${{ github.event.inputs.enable_yj }}
            - 开发工具集成: ${{ github.event.inputs.enable_kfgj }}
            - 压缩工具集成: ${{ github.event.inputs.enable_zip }}
            - Docker 集成: ${{ github.event.inputs.enable_docker }}
            
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
