name: Build and Release Droidspaces RootFS

on:
  workflow_dispatch: 
    inputs:
      build_target:
        description: 'Select the distribution to build'
        required: true
        type: choice
        default: 'Debian-13-KDE'
        options:
          - 'Debian-13-KDE'
          - 'Ubuntu-24-KDE'
          - 'Ubuntu-25-KDE'
          - 'Ubuntu-26-KDE'
          - 'Fedora-43-KDE'
          - 'Fedora-44-KDE'
          - 'Arch-KDE'
          - 'Kali-Rolling-KDE'
          - 'all'
          - 'all-wayland'
      custom_username:
        description: 'Custom username (default: Gold)'
        required: false
        type: string
        default: 'Gold'
      build_KDE:
        description: 'KDE desktop choice (conc-compact, min-minimal, mobile-mobile edition, none-no KDE)'
        required: true
        type: choice
        default: 'min'
        options: 
          - 'conc'
          - 'min'
          - 'mobile'
          - 'none'
      build_KDE_plus:
        description: 'KDE desktop auto-start on boot (Requires KDE desktop choice to be conc, min, or mobile)'
        required: true
        type: boolean
        default: true
      enable_anland_kde:
        description: 'Wayland support (supported on Debian-13, Ubuntu-26, Fedora-43/44, Kali-Rolling; mobile forces Wayland).'
        required: true
        type: boolean
        default: false
      PulseAudio:
        description: 'PulseAudio audio forwarding'
        required: true
        type: choice
        default: 'socket'
        options: 
          - 'socket'
          - 'tcp'
          - 'none'
      enable_zh_tz:
        description: 'Use Chinese language and change timezone'
        required: true
        type: boolean
        default: false
      enable_mesa:
        description: 'Enable Qualcomm Snapdragon GPU support'
        required: true
        type: boolean
        default: true
      enable_8gen2_wayland:
        description: 'Fix Snapdragon 8 Gen 2 Wayland display corruption'
        required: true
        type: boolean
        default: false
      enable_tmoe:
        description: 'Integrate TMOE'
        required: true
        type: boolean
        default: true
      nosnap:
        description: 'nosnap: remove Ubuntu Snap'
        required: true
        type: boolean
        default: false
      enable_srf:
        description: 'Enable input method fcitx5 support'
        required: true
        type: boolean
        default: false
      enable_binfmt:
        description: 'Enable cross-architecture support'
        required: true
        type: boolean
        default: false
      enable_yj:
        description: 'Enable NAT and hardware recognition support'
        required: true
        type: boolean
        default: true
      enable_kfgj:
        description: 'Development tools integration'
        required: true
        type: boolean
        default: false
      enable_zip:
        description: 'Compression tools integration'
        required: true
        type: boolean
        default: true
      enable_docker:
        description: 'Docker integration'
        required: true
        type: boolean
        default: false
      build_wayland_packages:
        description: 'Trigger KDE Wayland precompiled package workflow'
        required: true
        type: boolean
        default: false

jobs:
  # --------------------------------------------------------
  # Phase 1: setup (Environment preparation and variable generation)
  # --------------------------------------------------------
  setup:
    runs-on: ubuntu-latest
    outputs:
      templates: ${{ steps.find-templates.outputs.templates }}
      wayland_enabled: ${{ steps.find-templates.outputs.wayland_enabled }}
      wayland_package_target: ${{ steps.find-templates.outputs.wayland_package_target }}
      pulseaudio_effective: ${{ steps.find-templates.outputs.pulseaudio_effective }}
      build_id: ${{ steps.prep.outputs.build_id }}
      build_date: ${{ steps.prep.outputs.build_date }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Parse user build choices
        id: find-templates
        run: |
          TARGET="${{ github.event.inputs.build_target }}"
          BUILD_KDE="${{ github.event.inputs.build_KDE }}"
          ENABLE_ANLAND_KDE="${{ github.event.inputs.enable_anland_kde }}"
          BUILD_WAYLAND_PACKAGES="${{ github.event.inputs.build_wayland_packages }}"
          PULSE_AUDIO="${{ github.event.inputs.PulseAudio }}"
          WAYLAND_PACKAGE_TARGET=""
          
          case "$TARGET" in
            all)
              TEMPLATES=$(ls *.Dockerfile | sed 's/\.Dockerfile//' | jq -R -s -c 'split("\n")[:-1]')
              WAYLAND_PACKAGE_TARGET="all"
              ;;
            all-wayland)
              TEMPLATES=$(jq -n -c '["Debian-13-KDE","Ubuntu-26-KDE","Fedora-43-KDE","Fedora-44-KDE","Kali-Rolling-KDE"]')
              ENABLE_ANLAND_KDE="true"
              WAYLAND_PACKAGE_TARGET="all"
              ;;
            Debian-13-KDE)
              TEMPLATES=$(jq -n -c --arg t "$TARGET" '[$t]')
              WAYLAND_PACKAGE_TARGET="Debian13"
              ;;
            Ubuntu-26-KDE)
              TEMPLATES=$(jq -n -c --arg t "$TARGET" '[$t]')
              WAYLAND_PACKAGE_TARGET="ubuntu2604"
              ;;
            Fedora-43-KDE)
              TEMPLATES=$(jq -n -c --arg t "$TARGET" '[$t]')
              WAYLAND_PACKAGE_TARGET="Fedora43"
              ;;
            Fedora-44-KDE)
              TEMPLATES=$(jq -n -c --arg t "$TARGET" '[$t]')
              WAYLAND_PACKAGE_TARGET="Fedora44"
              ;;
            Kali-Rolling-KDE)
              TEMPLATES=$(jq -n -c --arg t "$TARGET" '[$t]')
              WAYLAND_PACKAGE_TARGET="kali"
              ;;
            *)
              TEMPLATES=$(jq -n -c --arg t "$TARGET" '[$t]')
              ;;
          esac

          if [ "$BUILD_KDE" = "mobile" ] && [ "$TARGET" != "Ubuntu-26-KDE" ] && [ "$TARGET" != "Debian-13-KDE" ] && [ "$TARGET" != "Fedora-43-KDE" ] && [ "$TARGET" != "Fedora-44-KDE" ] && [ "$TARGET" != "Kali-Rolling-KDE" ] && [ "$TARGET" != "all-wayland" ]; then
            echo "Error: KDE mobile edition is currently supported on Ubuntu-26-KDE, Debian-13-KDE, Fedora-43-KDE, Fedora-44-KDE, Kali-Rolling-KDE, all-wayland" >&2
            exit 1
          fi

          if [ "$ENABLE_ANLAND_KDE" = "true" ] && [ "$BUILD_KDE" = "none" ]; then
            echo "Error: KDE desktop choice cannot be 'none' when Wayland support is enabled" >&2
            exit 1
          fi

          if [ "$BUILD_KDE" = "mobile" ]; then
            echo "Notice: KDE mobile edition selected, Wayland support has been forced on"
            ENABLE_ANLAND_KDE="true"
          fi

          if [ "$ENABLE_ANLAND_KDE" = "true" ]; then
            echo "Notice: Wayland support enabled, PulseAudio will be disabled because the Anland app provides audio"
            PULSE_AUDIO="none"
          fi

          if [ "$BUILD_WAYLAND_PACKAGES" = "true" ] && [ -z "$WAYLAND_PACKAGE_TARGET" ]; then
            echo "Error: KDE Wayland precompiled packages are only available for Debian-13-KDE, Ubuntu-26-KDE, Fedora-43-KDE, Fedora-44-KDE, Kali-Rolling-KDE, all, or all-wayland" >&2
            exit 1
          fi
          
          echo "templates=$TEMPLATES" >> $GITHUB_OUTPUT
          echo "wayland_enabled=$ENABLE_ANLAND_KDE" >> $GITHUB_OUTPUT
          echo "wayland_package_target=$WAYLAND_PACKAGE_TARGET" >> $GITHUB_OUTPUT
          echo "pulseaudio_effective=$PULSE_AUDIO" >> $GITHUB_OUTPUT
          echo "Final decided build matrix: $TEMPLATES"
          echo "Final Wayland support value: $ENABLE_ANLAND_KDE"
          echo "Final KDE Wayland package target: ${WAYLAND_PACKAGE_TARGET:-none}"
          echo "Final PulseAudio value: $PULSE_AUDIO"

      - name: Prepare build metadata
        id: prep
        run: |
          BUILD_DATE=$(date +'%Y-%m-%d %H:%M:%S')
          BUILD_ID="v$(date +'%Y%m%d-%H%M%S')"
          echo "BUILD_DATE=$BUILD_DATE" >> $GITHUB_OUTPUT
          echo "BUILD_ID=$BUILD_ID" >> $GITHUB_OUTPUT
          echo "Build ID: $BUILD_ID"

  # --------------------------------------------------------
  # Optional: trigger KDE Wayland package rebuild
  # --------------------------------------------------------
  build-wayland-packages:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      actions: write
      checks: read
      contents: read
    steps:
      - name: Skip KDE Wayland package workflow
        if: ${{ github.event.inputs.build_wayland_packages != 'true' }}
        run: echo "KDE Wayland package workflow trigger is disabled."

      - name: Trigger and wait for KDE Wayland precompiled package workflow
        if: ${{ github.event.inputs.build_wayland_packages == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          WAYLAND_PACKAGE_TARGET: ${{ needs.setup.outputs.wayland_package_target }}
          REQUEST_ID: rootfs-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          set -euo pipefail

          gh api \
            --method POST \
            "repos/${{ github.repository }}/actions/workflows/build-kde-wayland.yml/dispatches" \
            -f "ref=${{ github.ref_name }}" \
            -f "inputs[build_target]=$WAYLAND_PACKAGE_TARGET" \
            -f "inputs[anland_ref]=main" \
            -f "inputs[anland_repo]=https://github.com/superturtlee/anland.git" \
            -f "inputs[commit_changes]=true" \
            -f "inputs[request_id]=$REQUEST_ID"

          echo "Triggered build-kde-wayland.yml with build_target=$WAYLAND_PACKAGE_TARGET request_id=$REQUEST_ID"

          run_id=""
          for attempt in {1..60}; do
            run_id="$(gh api \
              --method GET \
              "repos/${{ github.repository }}/actions/workflows/build-kde-wayland.yml/runs" \
              -f event=workflow_dispatch \
              -f branch="${{ github.ref_name }}" \
              -f per_page=20 \
              --jq "first(.workflow_runs[] | select(.display_title | contains(\"$REQUEST_ID\")) | .id) // \"\"")"

            if [ -n "$run_id" ]; then
              break
            fi

            echo "Waiting for build-kde-wayland.yml run to appear ($attempt/60)..."
            sleep 10
          done

          if [ -z "$run_id" ]; then
            echo "Error: timed out while waiting for build-kde-wayland.yml run to appear" >&2
            exit 1
          fi

          echo "Waiting for build-kde-wayland.yml run $run_id to complete..."
          gh run watch "$run_id" --repo "${{ github.repository }}" --exit-status --interval 60

  # --------------------------------------------------------
  # Phase 2: build (Build of regular Linux distribution RootFS)
  # --------------------------------------------------------
  build:
    needs: [setup, build-wayland-packages]
    if: ${{ needs.setup.outputs.templates != '[]' }}
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        template: ${{ fromJson(needs.setup.outputs.templates) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref_name }}

      - name: Verify build options
        run: |
          if [ "${{ inputs.build_KDE }}" = "none" ] && [ "${{ inputs.build_KDE_plus }}" = "true" ]; then
            echo "❌ Error: Cannot enable KDE auto-start when KDE desktop choice is 'none'"
            echo "Please re-run the workflow, uncheck 'KDE desktop auto-start on boot' or select a KDE desktop"
            exit 1
          fi

      - name: Build RootFS (${{ matrix.template }})
        run: |
          chmod +x build_rootfs-native.sh
          ./build_rootfs-native.sh \
            -i "${{ matrix.template }}.Dockerfile" \
            -v "${{ needs.setup.outputs.build_id }}" \
            -K "${{ inputs.build_KDE }}" \
            -L "${{ inputs.build_KDE_plus }}" \
            -P "${{ needs.setup.outputs.pulseaudio_effective }}" \
            -g "${{ inputs.enable_zh_tz }}" \
            -a "${{ inputs.enable_binfmt }}" \
            -b "${{ inputs.enable_yj }}" \
            -c "${{ inputs.enable_mesa }}" \
            -d "${{ inputs.enable_kfgj }}" \
            -e "${{ inputs.enable_zip }}" \
            -f "${{ inputs.enable_docker }}" \
            -h "${{ inputs.enable_srf }}" \
            -j "${{ inputs.enable_tmoe }}" \
            -n "${{ inputs.nosnap }}" \
            -t "${{ inputs.enable_8gen2_wayland }}" \
            -A "${{ needs.setup.outputs.wayland_enabled }}" \
            -u "${{ inputs.custom_username }}"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.template }}-rootfs
          path: "*.tar.xz"
          retention-days: 1

  # --------------------------------------------------------
  # Phase 3: release (Summary and release)
  # --------------------------------------------------------
  release:
    needs: [setup, build]
    if: ${{ !cancelled() && needs.setup.result == 'success' && needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: "*-rootfs"
          merge-multiple: true
          
      - name: Organize resources
        run: |
          mkdir -p release_assets
          mv *.tar.xz release_assets/
          PA_CHOICE="${{ needs.setup.outputs.pulseaudio_effective }}"
          CUSTOM_USERNAME="${{ github.event.inputs.custom_username }}"
          build_KDE_plus="${{ github.event.inputs.build_KDE_plus }}"
          if [ "$PA_CHOICE" != "none" ] && [ "$build_KDE_plus" = "false" ]; then
            cp "scripts/on_aaudio_${PA_CHOICE}.sh" "release_assets/on_aaudio_${PA_CHOICE}.sh"
            sed -i "s/USERNAME=\"Gold\"/USERNAME=\"${CUSTOM_USERNAME}\"/g" "release_assets/on_aaudio_${PA_CHOICE}.sh"
          fi
          
      - name: Create unified Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.setup.outputs.build_id }}
          name: "Droidspaces RootFS ${{ needs.setup.outputs.build_id }}"
          files: "release_assets/*"
          body: |
            Droidspaces RootFS Automated Build
            Build Time: ${{ needs.setup.outputs.build_date }}
            Build Target (User Specified): ${{ github.event.inputs.build_target }}
            Build ID: ${{ needs.setup.outputs.build_id }}

            Build Options:
            - **Custom Username**: ${{ github.event.inputs.custom_username }}
            - **KDE Desktop**: ${{ github.event.inputs.build_KDE }}
            - **KDE Auto-start**: ${{ github.event.inputs.build_KDE_plus }}
            - **Wayland support**: ${{ needs.setup.outputs.wayland_enabled }}
            - KDE Wayland package target: ${{ needs.setup.outputs.wayland_package_target || 'none' }}
            - PulseAudio Audio Forwarding: ${{ needs.setup.outputs.pulseaudio_effective }}
            - anland audio note: Wayland mode uses the built-in anland app audio, so PulseAudio is not needed
            - nosnap: ${{ github.event.inputs.nosnap }}
            - Use Chinese as Primary Language: ${{ github.event.inputs.enable_zh_tz }}
            - Qualcomm Snapdragon GPU Support: ${{ github.event.inputs.enable_mesa }}
            - Fix Snapdragon 8 Gen 2 Wayland display corruption: ${{ github.event.inputs.enable_8gen2_wayland }}
            - Integrate TMOE: ${{ github.event.inputs.enable_tmoe }}
            - Input Method fcitx5 Support: ${{ github.event.inputs.enable_srf }}
            - Cross-architecture Support: ${{ github.event.inputs.enable_binfmt }}
            - Container Hardware and Network Recognition Support: ${{ github.event.inputs.enable_yj }}
            - Development Tools Integration: ${{ github.event.inputs.enable_kfgj }}
            - Compression Tools Integration: ${{ github.event.inputs.enable_zip }}
            - Docker Integration: ${{ github.event.inputs.enable_docker }}
            
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
